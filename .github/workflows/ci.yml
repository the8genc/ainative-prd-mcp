name: CI

# Unit tests + a guard that the rendered site matches the committed skill catalog
# (npm test runs `skills:check`). No DB required — the tests are DB-free.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test
